<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VictoryToClan — CoC Clan Management System</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="VictoryToClan - Clash of Clans Clan Management System. Track contributions, war logs, points, promotions, and rules with a premium Supercell Store style interface.">
    <meta name="keywords" content="Clash of Clans, CoC, Clan Management, VictoryToClan, Supercell Store, Clan Leaderboard, Clan Statistics, War Tracker">
    <meta name="author" content="VictoryToClan">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/hero-bg.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lilita+One&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Custom Theme Config for Tailwind v4 CDN -->
    <style type="text/tailwindcss">
        @theme {
            --font-display: 'Lilita One', cursive;
            --font-sans: 'Inter', sans-serif;
            
            --color-bg-primary: #0a0e17;
            --color-bg-secondary: #111827;
            --color-bg-card: #1a1f2e;
            
            --color-brand-gold-start: #f5a623;
            --color-brand-gold-end: #ffd700;
            --color-brand-purple-start: #7c3aed;
            --color-brand-purple-end: #a855f7;
            --color-brand-blue-start: #3b82f6;
            --color-brand-blue-end: #60a5fa;
            
            --animate-shimmer: shimmer 2.5s infinite linear;
            --animate-float: float 6s ease-in-out infinite;
            --animate-pulse-slow: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            
            @keyframes shimmer {
                0% { background-position: -200% 0; }
                100% { background-position: 200% 0; }
            }
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }
        }
        
        /* Direct utility extensions */
        .hero-title-gradient {
            @apply bg-gradient-to-r from-amber-300 via-yellow-400 to-amber-500 bg-clip-text text-transparent filter drop-shadow-[0_2px_8px_rgba(245,166,35,0.3)];
        }
        .hero-title-gradient-2 {
            @apply bg-gradient-to-r from-yellow-400 via-orange-400 to-amber-400 bg-clip-text text-transparent filter drop-shadow-[0_2px_8px_rgba(251,191,36,0.3)];
        }
        .glass-panel {
            @apply bg-white/[0.03] border border-white/10 backdrop-blur-xl shadow-2xl;
        }
        .glass-card {
            @apply bg-white/[0.02] border border-white/5 backdrop-blur-lg hover:border-white/10 transition-all duration-300;
        }
    </style>
    
    <!-- Custom CSS Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#0a0e17] text-white font-sans min-h-screen overflow-x-hidden relative select-none">

    <!-- Floating Particles Canvas -->
    <canvas id="particles-canvas" class="fixed inset-0 pointer-events-none z-1 w-full h-full"></canvas>
    
    <!-- Main App Wrapper -->
    <div class="relative z-10 min-h-screen flex flex-col justify-between">
        
        <!-- Navbar Container -->
        <div id="navbar-container" class="sticky top-0 z-50"></div>
        
        <!-- Main SPA Page Content -->
        <main id="page-content" class="flex-grow min-h-screen"></main>
        
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-24 right-4 z-[9999] flex flex-col gap-3 max-w-sm pointer-events-none"></div>

    <!-- Main Module Entry Script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
